front:
  text: 宗鑑録序左朝請郎尚書禮部員外郎護軍楊傑撰諸佛真語以心為宗衆生信道以宗為鑑衆生界即諸佛界因迷而為衆生諸佛心是衆生心因悟而成諸佛心如明鑑萬象歷然佛與衆生其猶影像涅槃生死俱是強名鑒體寂而常照鑒光照而常寂心佛衆生三無差別國初吳越永明智覺壽禪師證最上乘了第一義洞究教典深達禪宗稟奉律儀廣行利益因讀楞伽經云佛語心為宗乃製宗鑑録於無疑中起疑非問處設問為不請友真大導師擲龍宮之寶均施群生徹祖門之關普容來者舉目而視有欲皆充信手而拈有疾皆愈蕩滌邪見指歸妙源所謂舉一心為宗照萬法為鑑矣若人以佛為鑑則知戒定慧為諸善之宗人天聲聞緣覺菩薩如來由此而出一切善類莫不信受若以衆生為鑑則知貪瞋癡為諸惡之宗修羅旁生地獄鬼趣由此而出一切惡類莫不畏憚善惡雖異其宗則同返鑑其心則知靈明湛寂廣大融通無為無住無修無證無塵可染無垢可磨為一切諸法之宗矣初吳越忠懿王序之祕于教藏至元豐中皇弟魏端獻王鏤板分施名藍四方學者罕遇其本元祐六年夏游東都法雲道場始見錢唐新本尤為精詳乃吳人徐思恭請法涌禪師同永樂法真二三耆宿遍取諸録用三乘典籍聖賢教語校讀成就以廣流布其益甚博法涌知豫喜閲是録因請為序云宗鏡録序天下大元帥吳越國王俶製詳夫域中之教者三正君臣親父子厚人倫儒吾之師也寂兮寥兮視聽無得自微妙升虛無以止乎乘風馭景君得之則善建不拔人得之則延貺無窮道儒之師也四諦十二因緣三明八解脫時習不忘日修以得一登果地永達真常釋道之宗也惟此三教並自心修心鏡録者智覺禪師所撰也總乎百卷包盡微言我佛金口所宣盈于海藏蓋亦提誘後學師之智慧辨才演暢萬法明了一心禪際河遊慧間雲布數而稱之莫能盡紀聊為小序以頌宣行云爾宗鏡録序大宋吳越國慧日永明寺主智覺禪師延壽集伏以真源湛寂覺海澄清絶名相之端無能所之迹最初不覺忽起動心成業識之由為覺明之咎因明起照見分俄興隨照立塵相分安布如鏡現像頓起根身次則隨想而世界成差後即因智而憎愛不等從此遺真失性執相徇名積滯著之情塵結相續之識浪鎖真覺於夢夜沈迷三界之中瞽智眼於昏衢匍匐九居之內遂乃縻業繫之苦喪解脫之門於無身中受身向無趣中立趣約依處則分二十五有論正報則具十二類生皆從情想根由遂致依正差別向不遷境上虛受輪回於無脫法中自生繫縛如春蠶作繭似秋蛾赴燈以二見妄想之絲纏苦聚之業質用無明貪愛之翼撲生死之火輪用谷響言音論四生妍醜以妄想心鏡現三有形儀然後違順想風動搖覺海貪癡愛水資潤苦芽一向徇塵罔知反本發狂亂之知見翳於自心立幻化之色聲認為他法從此一微涉境漸成戞漢之高峯滴水興波終起吞舟之巨浪邇後將欲反初復本約根利鈍不同於一真如界中開三乘五性或見空而證果或了緣而入真或三祇熏鍊漸具行門或一念圓修頓成佛道斯則剋證有異一性非殊因成凡聖之名似分真俗之相若欲窮微洞本究旨通宗則根本性離畢竟寂滅絶升沈之異無縛脫之殊既無在世之人亦無滅度之者二際平等一道清虛識智俱空名體咸寂逈無所有唯一真心達之名見道之人昧之號生死之始復有邪根外種小智權機不了生死之病原罔知人我之見本唯欲厭喧斥動破相析塵雖云味靜冥空不知埋真拒覺如不辨眼中之赤眚但滅燈上之重光罔窮識內之幻身空避日中之虛影斯則勞形役思喪力捐功不異足水助氷投薪益火豈知重光在眚虛影隨身除病眼而重光自消息幻質而虛影當滅若能回光就已反境觀心佛眼明而業影空法身現而塵跡絶以自覺之智刃剖開纏內之心珠用一念之慧鋒斬斷塵中之見網此窮心之旨達識之詮言約義豐文質理詣揭疑關於正智之戶剃妄草於真覺之原愈入髓之沈痾截盤根之固執則物我遇智火之焰融唯心之爐名相臨慧日之光釋一真之海斯乃內證之法豈在文詮知解莫窮見聞不及今為未見者演無見之妙見未聞者入不聞之圓聞未知者說無知之真知未解者成無解之大解所冀因指見月得兔忘罤抱一冥宗捨詮檢理了萬物由我明妙覺在身可謂搜抉玄根磨礱理窟剔禪宗之骨髓標教網之紀綱餘惑微瑕應手圓淨玄宗妙旨舉意全彰能摧七慢之山永塞六衰之路塵勞外道盡赴指呼生死魔軍全消影響現自在力闡大威光示真寶珠利用無盡傾祕密藏周濟何窮可謂香中爇其牛頭寶中探其驪頷華中採其靈瑞照中耀其神光食中啜其乳糜水中飲其甘露藥中服其九轉主中遇其聖王故得法性山高頓落群峯之峻醍醐海闊橫吞衆派之波似夕魄之騰輝奪小乘之星宿如朝陽之孕彩破外道之昏蒙猶貧法財之人值大寶聚若渴甘露之者遇清涼池為衆生所敬之天作菩薩真慈之父抱膏肓之疾逢善見之藥王迷險難之途偶明達之良導久居暗室忽臨寶炬之光明常處裸形頓受天衣之妙服不求而自得無功而頓成故知無量國中難聞名字塵沙劫內罕遇傳持以如上之因緣目為心鏡現一道而清虛可鑒辟群邪而毫髮不容妙體無私圓光匪外無邊義海咸歸顧眄之中萬像形容盡入照臨之內斯乃曹溪一味之旨諸祖同傳鵠林不二之宗群經共述可謂萬善之淵府衆哲之玄源一字之寶王群靈之元祖遂使離心之境文理俱虛即識之塵詮量有據一心之海印揩定圓宗八識之智燈照開邪暗實謂含生靈府萬法義宗轉變無方卷舒自在應緣現迹任物成名諸佛體之號三菩提菩薩修之稱六度行海慧變之為水龍女獻之為珠天女散之為無著華善友求之為如意寶緣覺悟之為十二緣起聲聞證之為四諦人空外道取之為邪見河異生執之作生死海論體則妙符至理約事則深契正緣然雖標法界之總門須辨一乘之別旨種種性相之義在大覺以圓通重重即入之門唯種智而妙達但以根羸靡鑒學寡難周不知性相二門是自心之體用若具用而失恆常之體如無水有波若得體而闕妙用之門似無波有水且未有無波之水曾無不濕之波以波徹水源水窮波末如性窮相表相達性原須知體用相成性相互顯今則細明總別廣辨異同研一法之根元搜諸緣之本末則可稱宗鏡以鑒幽微無一法以逃形則千差而普會遂則編羅廣義撮略要文鋪舒於百卷之中卷攝在一心之內能使難思教海指掌而念念圓明無盡真宗目覩而心心契合若神珠在手永息馳求猶覺樹垂陰全消影跡獲真寶於春池之內拾礫渾非得本頭於古鏡之前狂心頓歇可以深挑見刺永截疑根不運一毫之功全開寶藏匪用剎那之力頓獲玄珠名為一乘大寂滅場真阿蘭若正修行處此是如來自到境界諸佛本住法門是以普勸後賢細垂玄覽遂得智窮性海學洞真源此識此心唯尊唯勝此識者十方諸佛之所證此心者一代時教之所詮唯尊者教理行果之所歸唯勝者信解證入之所趣諸賢依之而解釋論起千章衆聖體之以弘宣談成四辨所以掇奇提異研精洞微獨舉宏綱大張正網撈摝五乘機地升騰第一義天廣證此宗利益無盡遂得正法久住摧外道之邪林能令廣濟含生塞小乘之亂轍則無邪不正有僞皆空由自利故發智德之原由利他故立恩德之事成智德故則慈起無緣之化成恩德故則悲含同體之心以同體故則心起無心以無緣故則化成大化心起無心故則何樂而不與化成大化故則何苦而不收何樂而不與則利鈍齊觀何苦而不收則怨親普救遂使三草二木咸歸一地之榮邪種焦芽同霑一雨之潤斯乃盡善盡美無比無儔可謂括盡因門搜窮果海故得創發菩提之士初求般若之人了知成佛之端由頓圓無滯明識歸家之道路直進何疑或離此別修隨他妄解如搆角取乳緣木求魚徒歷三祇終無一得若依此旨信受弘持如快舸隨流無諸阻滯又遇便風之勢更加櫓棹之功則疾屆寶城忽登覺岸可謂資糧易辦道果先成被迦葉上行之衣坐釋迦法空之座登彌勒毗盧之閣入普賢法界之身能令客作賤人全領長者之家業忽使沈空小果頓受如來之記名未有一門匪通斯道必無一法不契此宗過去覺王因茲成佛未來大士仗此證真則何一法門而不開何一義理而不現無一色非三摩鉢地無一聲非陀羅尼門嘗一味而盡變醍醐聞一香而皆入法界風柯月渚並可傳心烟島雲林咸提妙旨步步蹈金色之界念念嗅薝蔔之香掬滄海而已得百川到須彌而皆同一色煥兮開觀象之目盡復自宗寂爾導求珠之心俱還本法遂使邪山落仞苦海收波智楫以之安流妙峯以之高出今詳祖佛大意經論正宗削去繁文唯搜要旨假申問答廣引證明舉一心為宗照萬法如鏡編聯古製之深義撮略寶藏之圓詮同此顯揚稱之曰録分為百卷大約三章先立正宗以為歸趣次申問答用去疑情後引真詮成其圓信以茲妙善普施含靈同報佛恩共傳斯旨耳標宗章第一詳夫祖標禪理傳默契之正宗佛演教門立詮下之大旨則前賢所稟後學有歸是以先列標宗章為有疑故問以決疑故答因問而疑情得啓因答而妙解潛生謂此圓宗難信難解是第一之說備最上之機若不假立言詮無以蕩其情執因指得月不無方便之門獲兔忘罤自合天真之道次立問答章但以時當末代罕遇大機觀淺心浮根微智劣雖知宗旨的有所歸問答決疑漸消惑障欲堅信力須假證明廣引祖佛之誠言密契圓常之大道遍採經論之要旨圓成決定之真心後陳引證章以此三章通為一觀搜羅該括備盡於茲矣問先德云若教我立宗定旨如龜上覓毛兔邊求角楞伽經偈云一切法不生不應立是宗何故標此章名答斯言遣滯若無宗之宗則宗說兼暢古佛皆垂方便門禪宗亦開一線道切不可執方便而迷大旨又不可廢方便而絶後陳然機前無教教後無實設有一解一悟皆是落後之事屬第二頭所以大智度論云以佛眼觀一切十方國土中一切物尚不見無何況有法畢竟空法能破顛倒令菩薩成佛是事尚不可得何況凡夫顛倒有法今依祖佛言教之中約今學人隨見心性發明之處立心為宗是故西天釋迦文佛云佛語心為宗無門為法門此土初祖達磨大師云以心傳心不立文字則佛佛手授授斯旨祖祖相傳傳此心已上約祖佛所立宗旨又諸賢聖所立宗體者杜順和尚依華嚴經立自性清淨圓明體此即是如來藏中法性之體從本已來性自滿足處染不垢修治不淨故云自性清淨性體遍照無幽不矚故曰圓明又隨流加染而不垢返流除染而不淨亦可在聖體而不增處凡身而不減雖有隱顯之殊而無差別之異煩惱覆之則隱智慧了之則顯非生因之所生唯了因之所了斯即一切衆生自心之體靈知不昧寂照無遺非但華嚴之宗亦是一切教體佛地論立一清淨法界體論云清淨法界者一切如來真實自體無始時來自性清淨具足種種過十方界極微塵數性相功德無生無滅猶如虛空遍一切有情平等共有與一切法不一不異非有非無離一切相一切分別一切名言皆不能得唯是清淨聖智所證二空無我所顯真如為其自性諸聖分證諸佛圓證此清淨法界即真如妙心為諸佛果海之源作群生實際之地此皆是立宗之異名非別有體或言宗者尊也以心為宗故云天上天下唯我獨尊或言體者性也以心為體故云知一切法即心自性或言智者以心為智即是本性寂照之用所以云自覺聖智普光明智等若約義用而分則體宗用別若會歸平等則一道無差所以華嚴記問云等妙二位全同如來普光明智者結成入普所以此會說等妙二覺二覺全同普光明智即是會歸之義問等覺同妙覺於理可然妙覺之外何有如來普光明智為所同耶答說等覺說妙覺即是約位普光明智不屬因果該通因果其由自覺聖智超絶因果故楞伽經妙覺位外更立自覺聖智之位亦猶佛性有因有果有因因有果果以因取之是因佛性以果取之是果佛性然則佛性非因非果普光明智亦復如是體絶因果為因果依果方究竟故云如來普光明智或稱為本者以心為本故涅槃疏云涅槃宗本者諸行皆以大涅槃心為本本立道生如無綱目不立無皮毛靡附心為本故其宗得立問若欲明宗只合純提祖意何用兼引諸佛菩薩言教以為指南故宗門中云借蝦為眼無自己分只成文字聖人不入祖位答從上非是一向不許看教恐慮不詳佛語隨文生解失於佛意以負初心或若因詮得旨不作心境對治直了佛心又有何過只如藥山和尚一生看大涅槃經手不釋卷時有學人問和尚尋常不許學人看經和尚為什麼自看師云只為遮眼問學人還看得不師云汝若看牛皮也須穿且如西天第一祖師是本師釋迦牟尼佛首傳摩訶迦葉為初祖次第相傳迄至此土六祖皆是佛弟子今引本師之語訓示弟子令因言薦道見法知宗不外馳求親明佛意得旨即入祖位誰論頓漸之門見性現證圓通豈標前後之位若如是者何有相違且如西天上代二十八祖此土六祖乃至洪州馬祖大師及南陽忠國師鵝湖大義禪師思空山本淨禪師等並博通經論圓悟自心所有示徒皆引誠證終不出自胸臆妄有指陳是以綿歷歲華真風不墜以聖言為定量邪僞難移用至教為指南依憑有據故圭峯和尚云謂諸宗始祖即是釋迦經是佛語禪是佛意諸佛心口必不相違諸祖相承根本是佛親付菩薩造論始末唯弘佛經況迦葉乃至毱多弘傳皆兼三藏及馬鳴龍樹悉是祖師造論釋經數十萬偈觀風化物無定事儀所以凡稱知識法爾須明佛語印可自心若不與了義一乘圓教相應設證聖果亦非究竟今且録一二以證斯文洪州馬祖大師云達磨大師從南天竺國來唯傳大乘一心之法以楞伽經印衆生心恐不信此一心之法楞伽經云佛語心為宗無門為法門何故佛語心為宗佛語心者即心即佛今語即是心語故云佛語心為宗無門為法門者達本性空更無一法性自是門性無有相亦無有門故云無門為法門亦名空門亦名色門何以故空是法性空色是法性色無形相故謂之空知見無盡故謂之色故云如來色無盡智慧亦復然隨生諸法處復有無量三昧門遠離內外知見情執亦名總持門亦名施門謂不念內外善惡諸法乃至皆是諸波羅蜜門色身佛是實相佛家用經云三十二相八十種好皆從心想生亦名法性家焰亦法性功勳菩薩行般若時火燒三界內外諸物盡於中不損一草葉為諸法如相故故經云不壞於身而隨一相今知自性是佛於一切時中行住坐臥更無一法可得乃至真如不屬一切名亦無無名故經云智不得有無內外無求任其本性亦無任性之心經云種種意生身我說為心量即無心之心無量之量無名為真名無求是真求經云夫求法者應無所求心外無別佛佛外無別心不取善不作惡淨穢兩邊俱不依法無自性三界唯心經云森羅及萬像一法之所印凡所見色皆是見心心不自心因色故心色不自色因心故色故經云見色即是見心南陽忠國師云禪宗法者應依佛語一乘了義契取本原心地轉相傳授與佛道同不得依於妄情及不了義教橫作見解疑誤後學俱無利益縱依師匠領受宗旨若與了義教相應即可依行若不了義教互不相許譬如師子身中蟲自食師子身中肉非天魔外道而能破滅佛法矣時有禪客問曰阿那箇是佛心師曰牆壁瓦礫無情之物並是佛心禪客曰與經大相違也經云離牆壁瓦礫無情之物名為佛性今云一切無情之物皆是佛心未審心之與性為別不別師曰迷人即別悟人不別禪客曰與經又相違也經云善男子心非佛性佛性是常心是無常今云不別未審此意如何師曰汝自依語不依義譬如寒月結水為氷及至暖時釋氷成水衆生迷時結性成心悟時釋心成性汝定執無情之物非心者經不應言三界唯心故華嚴經云應觀法界性一切唯心造今且問汝無情之物為在三界內為在三界外為復是心不是心若非心者經不應言三界唯心若是心者又不應言無性汝自違經我不違也鵝湖大義禪師因詔入內遂問京城諸大師大德汝等以何為道或有對云知見為道師云維摩經云法離見聞覺知云何以知見為道又有對云無分別為道師云經云善能分別諸法相於第一義而不動云何以無分別為道又皇帝問如何是佛性答不離陛下所問是以或直指明心或破執入道以無方之辨祛必定之執運無得之智屈有量之心思空山本淨禪師語京城諸大德云汝莫執心此心皆因前塵而有如鏡中像無體可得若執實有者則失本原常無自性圓覺經云妄認四大為自身相六塵緣影為自心相楞伽經云不了心及緣則生二妄想了心及境界妄想則不生維摩經云法非見聞覺知且引三經證斯真實五祖下莊嚴大師一生示徒唯舉維摩經寶積長者讚佛頌末四句云不著世間如蓮華常善入於空寂行達諸法相無罣礙稽首如空無所依學人問云此是佛語欲得和尚自語師云佛語即我語我語即佛語是故初祖西來創行禪道欲傳心印須假佛經以楞伽為證明知教門之所自遂得外人息謗內學稟承祖胤大興玄風廣被是以初心始學之者未自省發已前若非聖教正宗憑何修行進道設不自生妄見亦乃盡值邪師故云我眼本正因師故邪西天九十六種執見之徒皆是斯類故知木匪繩而靡直理非教而不圓如上略引二三皆是大善知識物外宗師禪苑麟龍祖門龜鏡示一教而風行電卷垂一語而山崩海枯帝王親師朝野歸命叢林取則後學稟承終不率自胸襟違於佛語凡有釋疑去僞顯性明宗無不一一廣引經文備彰佛意所以永傳後嗣不墜家風若不然者又焉得至今紹繼昌盛法力如是證驗非虛又若欲研究佛乘披尋寶藏一一須消歸自己言言使冥合真心但莫執義上之文隨語生見直須探詮下之旨契會本宗則無師之智現前天真之道不昧如華嚴經云知一切法即心自性成就慧身不由他悟故知教有助道之力初心安可暫忘細詳法利無邊是乃搜揚纂集且凡論宗旨唯逗頓機如日出照高山駃馬見鞭影所以丹霞和尚云相逢不擎出舉意便知有如今宗鏡尚不待舉意便自知有故首楞嚴經云圓明了知不因心念揚眉動目早是周遮如先德頌云便是猶倍句動目即差違若問曹溪旨不更待揚眉今為樂佛乘人實未薦者假以宗鏡助顯真心雖挂文言妙旨斯在俯收中下盡被群機但任當人各資己利百川雖潤何妨大海廣含五嶽自高不礙太陽普照根機莫等樂欲匪同於四門入處雖殊在一真見時無別如獲鳥者羅之一目不可以一目為羅理國者功在一人不可以一人為國如內德論云夫一水無以和羹一木無以構室一衣不稱衆體一藥不療殊疾一彩無以為文繡一聲無以諧琴瑟一言無以勸衆善一戒無以防多失何得怪漸頓之異令法門之專一故云如為一人衆多亦然如為衆多一人亦然豈同劣解凡情而生局見我此無礙廣大法門如虛空非相不拒諸相發揮似法性無身匪礙諸身頓現須以六相義該攝斷常之見方消用十玄門融通去取之情始絶又若實得一聞千悟獲大總持即胡假言詮無勞解釋船筏為渡迷津之者導師因引失路之人凡關一切言詮於圓宗所示皆為未了文字性離即是解脫迷一切諸法真實之性向心外取法而起文字見者今還將文字對治示其真實若悟諸法本源即不見有文字及絲毫發現方知一切諸法即心自性則境智融通色空俱泯當此親證圓明之際入斯一法平等之時又有何法是教而可離何法是祖而可重何法是頓而可取何法是漸而可非則知皆是識心橫生分別所以祖佛善巧密布權門廣備教乘方便逗會才得見性當下無心乃藥病俱消教觀咸息如楞伽經偈云諸天及梵乘聲聞緣覺乘諸佛如來乘我說此諸乘乃至有心轉諸乘非究竟若彼心滅盡無乘及乘者無有乘建立我說為一乘引導衆生故分別說諸乘故先德云一翳在目千華亂空一妄在心恆沙生滅翳除華盡妄滅證真病差藥除氷融水在神丹九轉點鐵成金至理一言轉凡成聖狂心不歇歇即菩提鏡淨心明本來是佛問如上所標已知大意何用向下更廣開釋答上根利智宿習生知才看題目宗之一字已全入佛智海中永斷纖疑頓明大旨則一言無不略盡攝之無有遺餘若直覽至一百卷終乃至恆沙義趣龍宮寶藏鷲嶺金文則殊說更無異途舒之遍周法界以前略後廣唯是一心本卷末舒皆同一際終無異旨有隔前宗都謂迷情妄興取捨唯見紙墨文字嫌卷軸多但執寂默無言欣為省要皆是迷心徇境背覺合塵不窮動靜之本原靡達一多之起處偏生局見唯懼多聞如小乘之怖法空似波旬之難衆善以不達諸法真實性故隨諸相轉墮落有無如大涅槃經云若人聞說大涅槃一字一句不作字相不作句相不作聞相不作佛相不作說相如是義者名無相相釋曰若云即文字無相是常見若云離文字無相是斷見又若執有相相亦是常見若執無相相亦是斷見但亡即離斷常四句百非一切諸見其旨自現當親現入宗鏡之時何文言識智之能詮述乎所以先德云若覓經了性真如無可聽若覓法雞足山間問迦葉大士持衣在此山無情不用求專甲斯則豈可運見聞覺知之心作文字句義之解若明宗達性之者雖廣披尋尚不見一字之相終不作言詮之解以迷心作物者生斯紙墨之見耳故信心銘云六塵不惡還同正覺智者無為愚人自縛如斯達者則六塵皆是真宗萬法無非妙理何局於管見而迷於大旨耶豈知諸佛廣大境界菩薩作用之門所以大海龍王置十千之問釋迦文佛開八萬勞生之門普慧菩薩申二百之疑普賢大士答二千樂說之辨如華嚴經普眼法門假使有人以大海量墨須彌聚筆寫於此普眼法門一品中一門一門中一法一法中一義一義中一句不得少分何況能盡又如大涅槃經中佛言我所覺了一切諸法如因大地生草木等為諸衆生所宣說者如手中葉只如已所說法教溢龍宮龍樹菩薩暫看有一百洛叉出在人間於西天尚百分未及一翻來東土故不足言豈況未所說法耶斯乃無盡妙旨非淺智所知性起法門何劣解能覽燕雀焉測鴻鵠之志井蛙寧識滄海之淵如師子大哮吼狸不能為如香象所負擔驢不能勝如毗沙門寶貧不能等如金翅鳥飛烏不能及唯依情而起見但逐物而意移或說有而不涉空或言空而不該有或談略為多外之一或立廣為一外之多或離默而執言或離言而求默或據事外之理或著理外之事殊不能悟此自在圓宗演廣非多此是一中之多標略非一此是多中之一談空不斷斯乃即有之空論有不常斯乃即空之有或有說亦得此即默中說或無說亦得此即說中默或理事相即亦得此理是成事之理此事是顯理之事或理理相即亦得以一如無二如真性常融會或事事相即亦得此全理之事一一無礙或理事不即亦得以全事之理非事所依非能依不隱真諦故以全理之事非理能依非所依不壞俗諦故斯則存泯一際隱顯同時如闡普眼之法門皆是理中之義似舒大千之經卷非標心外之文故經云一法能生無量義非聲聞緣覺之所知不同但空孤調之詮偏枯決定之見今此無盡妙旨標一法而眷屬隨生圓滿性宗舉一門而諸門普會非純非雜不一不多如五味和其羹雜綵成其繡衆寶成其藏百藥成其丸邊表融通義味周足搜微抉妙盡宗鏡中依正混融因果無礙人法無二初後同時凡舉一門皆能圓攝無盡法界非內非外不一不多舒之則涉入重重卷之則真門寂寂如華嚴經中師子座中莊嚴具內各出一佛世界塵數菩薩身雲此是依正人法無礙又如佛眉間出勝音等佛世界塵數菩薩此是因果初後無礙乃至剎土微塵各各具無邊智德毛孔身分一一攝廣大法門何故如是奇異難思乃一心融即故爾以要言之但一切無邊差別佛事皆不離無相真心而有如華嚴經頌云佛住甚深真法性寂滅無相同虛空而於第一實義中示現種種所行事所作利益衆生事皆依法性而得有相與無相無差別入於究竟皆無相又攝大乘論頌云即諸三摩地大師說為心由心彩畫故如所作事業故知凡聖所作真俗緣生此一念之心剎那起時即具三性三無性六義謂一念之心是緣起法是依他起情計有實即是遍計所執體本空寂即是圓成即依三性說三無性故六義具矣若一念心起具斯六義即具一切法矣以一切真俗萬法不出三性三無性故法性論云凡在起滅皆非性也起無起性故雖起而不常滅無滅性雖滅而不斷如其有性則陷於四見之網又云尋相以推性見諸法之無性尋性以求相見諸法之無相是以性相互推悉皆無性是以若執有性墮四見之邪林若了性空歸一心之正道故華嚴經云自深入無自性真實法亦令他入無自性真實法心得安隱以茲妙達方入此宗則物物冥真言言契旨若未親省不發圓機言之則乖宗默之又致失豈可以四句而取六情所知歟但祖教並施定慧雙照自利利他則無過矣設有堅執己解不信佛言起自障心絶他學路今有十問以定紀綱還得了了見性如晝觀色似文殊等不還逢緣對境見色聞聲舉足下足開眼合眼悉得明宗與道相應不還覽一代時教及從上祖師言句聞深不怖皆得諦了無疑不還因差別問難種種徵詰能具四辨盡決他疑不還於一切時一切處智照無滯念念圓通不見一法能為障礙未曾一剎那中暫令間斷不還於一切逆順好惡境界現前之時不為間隔盡識得破不還於百法明門心境之內一一得見微細體性根原起處不為生死根塵之所惑亂不還向四威儀中行住坐臥欽承祗對著衣喫飯執作施為之時一一辨得真實不還聞說有佛無佛有衆生無衆生或讚或毀或是或非得一心不動不還聞差別之智皆能明達性相俱通理事無滯無有一法不鑒其原乃至千聖出世得不疑不若實未得如是功不可起過頭欺誑之心生自許知足之意直須廣披至教博問先知徹祖佛自性之原到絶學無疑之地此時方可歇學灰息遊心或自辦則禪觀相應或為他則方便開示設不能遍參法界廣究群經但細看宗鏡之中自然得入此是諸法之要趣道之門如守母以識子得本而知末提綱而孔孔皆正牽衣而縷縷俱來又如以師子筋為琴絃音聲一奏一切餘絃悉皆斷壞此宗鏡力亦復如是舉之而萬類沈光顯之而諸門泯跡以此一則則破千途何須苦涉關津別生岐路所以志公歌云六賊和光同塵無力大難推托內發解空無相大乘力能翻却唯在玄覽得旨之時可驗斯文究竟真實丙午歲分司大藏都監開板
