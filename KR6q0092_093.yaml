body:
  text: 慧日永明寺主智覺禪師延壽集夫宗鏡錄是實相法門若信得何福若毀得何罪答此一心實相之門般若甚深之旨於難信之中或有信者法利無盡唯佛能知若有毀者謗般若罪過莫大焉現世受殃生身陷獄何以受報如此廣大以般若是一切世出世間凡聖之母猶如大地無物不從地生或若謗之則謗一切佛地三寶功德如十法界中一切眾生若昇若沈若愚若智無不皆從般若中來若不得般若威光實無一塵可立如般若經云欲尊貴自在乃至欲得菩提當學般若又云若欲得六根完具當學般若乃至鬼畜亦要完具以此鬼畜皆從學般若來故知不信宗鏡無有是處如諸法無行經云爾時文殊師利言世尊師子吼鼓音王如來滅度之後爾時有菩薩比丘名曰喜根時為法師質直端正不壞威儀不捨世法爾時眾生普皆利根樂聞深論其喜根法師於眾人前不稱讚少欲知足細行獨處但教眾人諸法實相所謂一切法性即是貪欲之性貪欲性即是諸法性瞋恚性即是諸法性愚癡性即是諸法性其喜根法師以是方便教化眾生眾生所行皆是一相各不相是非所行之道心無瞋癡以無瞋癡因緣故逮得法忍於佛法中決定不壞世尊爾時復有比丘法師行菩薩道名曰勝意其勝意比丘護持禁戒得四禪四無色定行十二頭陀世尊是勝意比丘有諸弟子其心輕動樂見他過世尊後於一時勝意菩薩入聚落乞食誤至喜根弟子家見舍主居士子即到其所敷座而坐為居士子稱讚少欲知足細行說無利語過讚嘆遠眾樂獨行者又於居士子前復說喜根法師過失是比丘不實以邪見道教化眾生是雜行者說婬欲無障礙瞋恚無障礙愚癡無障礙一切諸法皆無障礙是居士子利根得無生法忍即語勝意比丘大德汝知貪欲為是何法勝意言居士我知貪欲是煩惱居士子言大德是煩惱為在內在外耶勝意比丘言不在內不在外大德若貪欲不在內不在外不在東西南北四維上下十方即是無生若無生者云何說若垢若淨爾時勝意比丘瞋恚不喜從座起去作如是言是喜根比丘以妄語法多惑眾人是人以不學入音聲法門故聞佛音聲則喜聞外道音聲則瞋於梵行音聲則喜於非梵行音聲則瞋以不學入音聲法門故乃至爾時喜根菩薩於眾僧前說是諸偈云貪欲是涅槃恚癡亦如是如此三事中有無量佛道若有人分別貪欲瞋恚癡是人去佛遠譬如天與地菩提與貪欲是一而非二皆入一法門平等無有異凡夫聞怖畏去佛道甚遠貪欲不生滅不能令心惱若人有我心及有得見者是人為貪欲將入於地獄貪欲之實性即是佛法性佛法之實性亦是貪欲性是二法一相所謂是無相若能如是知則為世間導若有人分別是持戒毀戒以持戒誑故輕蔑於他人是人無菩提亦無有佛法但自安住立有所得見中若住空閑處自貴而賤人尚不得生天何況於菩提皆由著空閑住於邪見故邪見與菩提皆等無有異但以名字數語言故別異若人通達此則為近菩提分別煩惱垢即是著淨見無菩提佛法住有得見中若貪著佛法是則遠佛法貪無礙法故則還受苦惱若人無分別貪欲瞋恚癡入三毒性故則為見菩提是人近佛道疾得無生忍若見有為法與無為法異是人終不得解於有為法若知二性同必為人中尊佛不見菩提亦不見佛法不著諸法故降魔成佛道若欲度眾生勿分別其性一切諸眾生皆同於涅槃若能如是見是則得成佛其心不閑靜而現閑靜相是於天人中則為是大賊是人無菩提亦無有佛法若作如是願我當得作佛如是之凡夫無明力所牽佛法湛清淨其喻如虛空此中無可取亦無有可捨佛不得佛道亦不度眾生凡夫強分別作佛度眾生是人於佛法則為甚大遠若見眾生苦則是受苦者眾生無眾生而說有眾生住眾生相中則無有菩提若人見眾生是畢竟解脫無有婬恚癡知是為世將若人見眾生不見非眾生不得佛法實佛同眾生性若能如是知則為世間將乃至說是諸偈法時三萬諸天子得無生法忍萬八千人漏盡解脫即時地裂勝意比丘墮大地獄以是業障罪因緣故百千億那由他劫於大地獄受諸苦毒從地獄出七十四萬世常被誹謗若干百千劫乃至不聞佛之名字自是已後還得值佛出家學道而無志樂於六十二萬世常返道入俗亦以業障餘罪故於若干百千世諸根闇鈍世尊爾時喜根法師於今東方過十萬億佛土有國名寶莊嚴於中得阿耨多羅三藐三菩提號曰勝光明威德王如來應供正遍知今現在彼其勝意比丘今我身是世尊我未入如是法相門時受如是苦分別苦顛倒苦是故若發菩薩心者若發小乘心者不欲起如是業障罪不欲受如是苦惱者不應拒逆佛法無有處所可生瞋癡佛告文殊師利汝聞是諸偈得何等利世尊我畢是業障罪已聞是偈因緣故所在生處利根智慧得深法忍巧說深法文殊師利為誰力故能憶如是無量阿僧祇劫罪業因緣世尊諸菩薩有所念有所說有所思惟皆是佛之神力所以者何一切諸法皆從佛出故知若不信宗鏡中所說實相之理則如勝意比丘沒魂受裂地之大苦若有信如是說則如文殊師利智慧演深法之妙辯信毀交報因果無差普勸後賢應深信受若信般若福廣具前文今述謗方等罪略引誠證如大般若經中廣說謗法之罪謂此方墮阿鼻地獄此土劫壞罪猶未畢移置他方阿鼻地獄中他方復經劫壞罪亦未盡復移他方如是巡歷十方十方各經劫盡還生此土阿鼻地獄中千佛出世救之猶難若欲說其所受之身聞者當吐熱血而死故善現請說所受之身佛竟不說乃至華嚴地獄天子法華不輕四眾皆是不信悉墮阿鼻若有聞者應須驚懼以為鑒誡普曉群蒙次明信毀現受報者第一明信者唐釋慧姓董氏住襄陽少出家聽三論初住光福寺居山頂引汲為勞明欲往他寺夜見神人身長一丈衣以紫袍頂禮曰請住於此常講大乘經勿以小乘為慮其小乘者如高山無水不能利人大乘經者猶如大海自止此山多佛出世一人讀誦說大乘能令所住珍寶光明眷屬榮勝若有小乘前事並失唯願弘持勿孤所望法師須水此易得耳來月八日定當得之自往劍南慈母山大泉請一龍王去也言已不現恰至來月七日夜大風卒起從西南來雷震雨霔唯見清泉香而且美合眾幸及亡龍泉漸便乾竭信之為益其類是焉第二明毀者佛藏經云於未來世當有比丘不修身戒心慧是人輕笑如來所說畢竟空法又云若有聞空即當驚畏是人可愍直至地獄無有救者唐釋慧眺姓莊氏少出家以小乘為業住襄陽報善寺哲公座下龍泉開講三論心生不忍曰三論明空講者著空發言訖舌出三尺眼耳鼻並皆流血七日不語有伏律師聞其拔舌告已汝太癡也一言毀謗罪過五逆可信大乘方得免耳乃令燒香發願懺悔前言舌還收入遂往哲公所誓心斂迹唯聽大乘後往香山神足寺足不跨閫常習大乘時講華嚴等經用申懺謝常於眾中陳其前失獨處一房常坐常念貞觀十一年四月三日在寺後松林坐禪見有三人來形貌奇異禮拜請受菩薩戒訖曰禪師大利根若不改心信大乘者千佛出世猶在地獄又昔有人謗大乘臨終出現牛聲則知華報昭然果報寧失已上皆是障深不信或智淺謬傳依文起見悉成謗法如文殊師利巡行經云文殊師利言大德舍利弗若人說言過去未來現在如來有依不依如是之人則謗如來何以故真如無念亦無所念真如不退真如無相今宗鏡大意所錄之文或祖或教但有一字一句若理若事若智若行皆悉迴向指歸真如一心何者心之實性名曰真如性以不改為義真以無偽得名如則不變不異以此心性周遍圓融橫該十方竪徹三際至一切時處未甞間斷凡有一毫善根悉皆迴向念念合真如之體體無不寂一一順真如之用用何有窮所以但契一如自含眾德如華嚴經中真如相迴向有一百句一一句中無不同指皆為成就一心妙門如經云佛子此菩薩摩訶薩正念明了其心堅住遠離迷惑專意修行深心不動成不壞業趣一切智終不退轉志求大乘勇猛無畏植諸德本普安世間生勝善根修白淨法大悲增長心寶成就乃至譬如真如遍一切處無有邊際善根迴向亦復如是遍一切處無有邊際譬如真如真實為性善根迴向亦復如是了一切法真實為性譬如真如恒守本性無有改變善根迴向亦復如是守其本性始終不改譬如真如以一切法無性為性善根迴向亦復如是了一切法無性為性譬如真如無相為相善根迴向亦復如是了一切法無相為相譬如真如若有得者終無退轉善根迴向亦復如是若有得者於諸佛法永不退轉譬如真如一切諸佛之所行處善根迴向亦復如是一切如來所行之處譬如真如離境界相而為境界善根迴向亦復如是離境界相而為三世一切諸佛圓滿境界譬如真如能有安立善根迴向亦復如是悉能安立一切眾生譬如真如性常隨順善根迴向亦復如是盡未來劫隨順不斷譬如真如無能測量善根迴向亦復如是等虛空界盡眾生心無能測量譬如真如充滿一切善根迴向亦復如是一剎那中普周法界譬如真如常住無盡善根迴向亦復如是究竟無盡譬如真如無有比對善根迴向亦復如是普能圓滿一切佛法無有比對譬如真如體性堅固善根迴向亦復如是體性堅固非諸惑惱之所能沮譬如真如不可破壞善根迴向亦復如是一切眾生不能損壞譬如真如照明為體善根迴向亦復如是以普照明而為其性譬如真如無所不在善根迴向亦復如是於一切處悉無不在譬如真如遍一切時善根迴向亦復如是遍一切時譬如真如性常清淨善根迴向亦復如是住於世間而體清淨譬如真如於法無礙善根迴向亦復如是周行一切而無所礙譬如真如為眾法眼善根迴向亦復如是能為一切眾生作眼譬如真如性無勞倦善根迴向亦復如是修行一切菩薩諸行恒無勞倦譬如真如體性甚深善根迴向亦復如是其性甚深譬如真如無有一物善根迴向亦復如是了知其性無有一物譬如真如性非出現善根迴向亦復如是其體微妙難可得見譬如真如離眾垢翳善根迴向亦復如是慧眼清淨離諸癡翳譬如真如性無與等善根迴向亦復如是成就一切諸菩薩行最上無等譬如真如體性寂靜善根迴向亦復如是善能隨順寂靜之法譬如真如無有根本善根迴向亦復如是能入一切無根本法譬如真如體性無邊善根迴向亦復如是淨諸眾生其數無邊譬如真如體性無著善根迴向亦復如是畢竟遠離一切諸著譬如真如無有障礙善根迴向亦復如是除滅一切世間障礙譬如真如非世所行善根迴向亦復如是非諸世間之所能行譬如真如體性無住善根迴向亦復如是一切生死皆非所住譬如真如性無所作善根迴向亦復如是一切所作悉皆捨離譬如真如體性安住善根迴向亦復如是安住真實譬如真如與一切法而共相應善根迴向亦復如是與諸菩薩聽聞修習而共相應譬如真如一切法中性常平等善根迴向亦復如是於諸世間修平等行譬如真如不離諸法善根迴向亦復如是盡未來際不捨世間譬如真如一切法中畢竟無盡善根迴向亦復如是於諸眾生迴向無盡譬如真如與一切法無有相違善根迴向亦復如是不違三世一切佛法譬如真如普攝諸法善根迴向亦復如是盡攝一切眾生善根譬如真如與一切法同其體性善根迴向亦復如是與三世佛同一體性譬如真如與一切法不相捨離善根迴向亦復如是攝持一切世出世法譬如真如無能映蔽善根迴向亦復如是一切世間無能映蔽譬如真如不可動搖善根迴向亦復如是一切魔業無能動搖譬如真如性無垢濁善根迴向亦