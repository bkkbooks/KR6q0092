中法爾如是故書云以兆人之耳聽以四海之目視以己身知人身以己心知人心聖人無常心以百姓為心又云攝己從他萬事消和攝他從己諸事競起則內外指歸證明無盡問信受毀謗此宗鏡法罪福何重答此乃群賢之父諸佛之母萬善由生信謗豈不獲報重耶所以法華經云又如大梵天王一切眾生之父此經亦復如是一切聖賢學無學及發菩薩心者之父起信鈔云若謗此法以深自害亦害他人斷絕一切三寶之種一切如來皆依此法得涅槃故一切菩薩因之修行得入佛智故戊申歲分司大藏都監開板引證章第三夫所目宗鏡大旨煥然前雖問答決疑猶慮難信上根纔覽頓入總持之門中下雖觀猶墮狐疑之地今重為信力未深纖疑不斷者更引大乘經一百二十本諸祖語一百二十本賢聖集六十本都三百本之微言總一佛乘之真訓可謂舉一字而攝無邊教海立一理而收無盡真詮一一標宗同龍宮之遍覽重重引證若鷲嶺之親聞普令眠雲立雪之人坐參知識遂使究理探玄之者盡入圓宗尋古佛之叢林如臨皎日履祖師之閫域猶瞰淨天大覺昭然即肉眼而圓通佛眼疑情豁爾當凡心而顯現真心可謂現知指法界於掌內便同親證探妙旨於懷中大般若經云一切如來同在一處自性清淨無漏界攝又云三世諸佛住十方界為諸有情宣說正法無不皆用本性空為佛眼離本性空無別方便釋曰本性空者即是自性清淨心本性即自性空即清淨義此心則凡聖本有今古常然眾生不知諸佛因茲指授含靈現具祖師為此相傳故云離此別無方便大方廣佛華嚴經頌云言詞所說法小智妄分別是故生障礙不了於自心不能了自心云何知正道彼由顛倒想增長一切惡大涅槃經云信於二諦一乘之道更無異趣為是眾生速得解脫又云道者雖無色像可見稱量可知而實有用善男子如眾生心雖非是色非長非短非麁非細非縛非解非是見法而亦是有寶積經云一切法虛妄如夢以唯念故又云自為洲渚自為歸處法為洲渚法為歸處無別洲渚無別歸處釋曰起信論云所言法者即眾生心故知所向皆心豈有歸處住自境界無別方所法華經偈云又復不行上中下法有為無為實不實法亦不分別是男是女不得諸法不知不見是則名為菩薩行處一切諸法空無所有無有常住亦無起滅是名智者所親近處顛倒分別諸法有無是實非實是生非生在於閑處修攝其心安住不動如須彌山觀一切法皆無所有猶如虛空無有堅固不生不出不動不退常住一相是名近處釋曰若入一心一相之門尚無常住之法豈有起滅之緣自然不動如山心安如海可謂菩薩行處諸佛所居矣故華嚴經頌云法性如虛空諸佛於中住大集經云云何菩薩修心念處觀是心性不見內入心不見外入心不見內外入心不見陰中心不見界中心既不見已作是思惟如是心緣為異不異若心異緣則一時中應有二心若心即緣不應復能觀於自心猶如指端不能自觸心亦如是作是觀已見心無住無常變異所緣處滅又云不見一法一法相貌一法光明若如是見是名佛法之正見圓覺經云一時婆伽婆入於神通大光明藏三昧正受一切如來光嚴住持是諸眾生清淨覺地身心寂滅平等本際圓滿十方不二隨順於不二境現諸淨土又云善男子一切眾生種種幻化皆生如來圓覺妙心猶如空華從空而有幻華雖滅空性不壞眾生幻心還依幻滅諸幻盡滅覺心不動依幻說覺亦名為幻若說有覺猶未離幻說無覺者亦復如是是故幻滅名為不動善男子一切菩薩及末世眾生應當遠離一切幻化虛妄境界由堅執持遠離心故心如幻者亦復遠離遠離為幻亦復遠離離遠離幻亦復遠離得無所離即除諸幻譬如鑽火兩木相因火出木盡灰飛煙滅以幻修幻亦復如是諸幻雖盡不入斷滅善男子知幻即離不作方便離幻即覺亦無漸次一切菩薩及末世眾生依此修行如是乃能永離諸幻釋曰知幻即離不作方便者以幻無定相自性常離離即空也即一切凡聖垢淨萬法皆同幻如空故何用更作方便而求離離幻即覺亦無漸次者當離之時全成大覺即離即覺平等一照既無前後豈有漸次耶密嚴經偈云一切諸世間譬如熱時炎以諸不實相無而妄分別覺因所覺生所覺依能覺離一則無二譬如光共影無心亦無境量及所量事但依於一心如是而分別能知所知法唯依心妄計若了所知無能知則非有心為法自性及人之所渴入於八地中而彼得清淨九地行禪定十地大開覺法水灌其頂而成世所尊法身無有盡是佛之境界究竟如虛空心識亦如是又云爾時金剛藏菩薩告諸大眾仁者阿賴耶識從無始來為戲論熏習諸業所繫輪迴不已如海因風起諸識浪恒生恒滅不斷不常而諸眾生不自覺知隨於自識現眾境界若自了知如火焚薪即皆息滅入無漏位名為聖人楞伽經云第一義諦者但唯是心種種外相悉皆無有彼愚夫執著惡見欺誑自他不能明見一切諸法如實住處大慧一切諸法如實者謂能了達唯心所現首楞嚴經云佛告文殊及諸大眾十方如來及大菩薩於其自住三摩地中見與見緣并所想相如虛空華本無所有此見及緣元是菩提妙淨明體云何於中有是非是文殊吾今問汝如汝文殊更有文殊是文殊者為無文殊如是世尊我真文殊無是文殊何以故若有是者則二文殊然我今日非無文殊於中實無是非二相佛言此見妙明與諸空塵亦復如是本是妙明無上菩提淨圓真心妄為色空及與聞見如第二月誰為是月又誰非月文殊但一月真中間自無是月非月是以汝今觀見與塵種種發明名為妄想不能於中出是非是由是精真妙覺明性故能令汝出指非指四十二章經云出家沙門者斷欲去愛識自心原達佛本理悟無為法內無所得外無所求心不繫道亦不結業無念無作非修非證不歷諸位而自崇最名之曰道又佛言覩天地念非常覩世界念非常覩靈覺即菩提如是心識得道疾矣金剛三昧經云佛言如是眾生之心實無別境何以故心本淨故理無穢故以染塵故名為三界三界之心名為別境是境虛妄從心化生心若無妄即無別境大力菩薩言心若在淨諸境不生此心淨時應無三界佛言如是菩薩心不生境境不生心何以故所見諸境唯所見心心不幻化則無所見大方廣入如來智德不思議經云皆悉了達諸法實相自性平等猶如虛空又云於一法中了一切法無分別智常現在前釋曰一法者即是自心此心為諸法平等之性於自心性中了一切法有何分別不增不減經云甚深義者即第一義諦第一義諦者即眾生界眾生界者即如來藏如來藏者即法身釋曰夫心者為諸法總持之門作萬有真實之性故稱第一義諦雜雜心念故號眾生是心之界即眾生界從真如性起名曰如來無所缺減乃目為藏能積聚恒沙功德故名法身是以仁王經云最初一念具足八萬四千波羅蜜集福德三昧經云如瑠璃寶器隨所在處不失其性如是若有菩薩住是三昧雖在家當說是人名為出家能不失是法界體性釋曰是以悟心方能得道見性是名出家若見性則在家出家若不見性則出家在家故阿難未見性前自懺悔言我身雖出家心不入道佛地經云當知清淨法界者譬如虛空雖遍諸色種種相中而不可說有種種相體唯一味如是如來清淨法界雖復遍至種種相類所知境界而不可說有種種相體唯一味釋曰清淨法界者即一心無雜之法界以法為界豈有邊畔則一切色中皆有虛空性況一切法中皆有安樂性以隱覆此性故隨所知境應其情量現種種境界若以空明即有空現若以色明即有色現但隨處發明即隨處現所現種種皆妄心生相不可得唯一味真心湛然不動不空羂索經云持真言者以心置心觀自心心作於一切諸佛如來廣大出生殊勝尊妙菩薩地經云迷聖道者不知理道從自心生唯常苦身以求解脫如犬逐塊不知尋本所以大莊嚴論釋云譬如師子打射時而彼師子尋逐人來譬如癡犬被人打擲便逐瓦石不知尋本言師子者喻智慧人解求其本而滅煩惱然癡犬者即是外道五熱炙身不識心本法集經云能知一切唯是一心名為心自在於其掌中出諸珍寶亦以虛空而為庫藏名為物自在一切身口意業以智為本名智自在又云觀世音白佛言菩薩若受持一法一切諸佛法自然如在掌中何者是一法所謂大悲釋曰此是同體大悲此悲性遍一切眾生界故能一雨普潤蘭艾齊榮一念咸收邪正俱濟大灌頂經云禪思比丘無他想念唯守一法然後見真釋曰一法為宗諸塵無寄他緣自絕妙性顯然志當歸一而何智不明尋流得源而何疑不釋撮要之旨斯莫大焉寶雲經云一切諸法心為上首若知於心則能得知一切諸法般舟三昧經偈云諸佛從心得解脫心者無垢名清淨五道鮮潔不受染有解此者成大道釋曰五道由心心體常淨雖遍五道不受彼色則淪五趣而不墜居一相而非昇展法界而不周入微塵而非縮以真如一心本性清淨無增減故以此一法能收一切似濫觴一滴之水與四海水潤性無差如芥子孔中之空等十方空包容匪別故云天得一以清地得一以寧萬物得一以生今得一而道成又云聖人抱一為天下式即此宗鏡作禪門之法式也大方等陀羅尼經云舍利弗問文殊言受記當於何求文殊師利言當於如如性中求釋曰如如性即是一切眾生真心之性思益經云眾生如即是漏盡解脫如以一切法悉入於如無有體性即是諸佛解脫於眾生心行中求因果經偈云一切造善惡皆從心想生是故真出家皆以心為本大法炬陀羅尼經云佛告毘舍佉如是色相不可眼見當知彼是心識境界唯意所知是故不可以眼見毘舍佉一切眾生所有心意不可言說唯佛智知像法決疑經云今日坐中無央數眾各見不同或見如來入涅槃或見如來住世一劫若減一劫若無量劫或見如來丈六之身或見小身或見大身或見報身蓮華藏世界海為千百億釋迦牟尼佛說心地法門或見法身同於虛空無有分別無相無礙遍同法界或見此處山林地土沙礫或見七寶或見此處乃是三世諸佛所行之處或見此處即是不思議諸佛境界真實之法釋曰故知佛無定形隨識而自分麁妙境無異相因心而空見短長可謂現證法門理歸宗鏡如來興顯經偈云諸佛所行性一切諸眾生皆在心性中相可相同相現寶藏經云菩薩問文殊師利以何緣故一切諸法皆是佛法文殊言如佛智所覺又問如何佛智所覺乃至答言解自心如故修行慈分經云一切諸法體相微細皆悉空寂凡夫之人以自分別生諸境界自分別中還自繫縛乃至未了心之自性劑爾許時如在夢中妄著諸境復應觀察一切三界皆悉是空空不礙空入楞伽經偈云爾時佛神力復化作山城崔嵬百千相嚴飾對須彌無量億華園皆是眾寶林香氣廣流布芬馥未曾聞一一寶山中皆示現佛身亦有羅婆那夜叉眾等住十方佛國土及於諸佛身佛子夜叉王皆來集彼山而此楞伽城所有諸眾等皆悉見自身入化楞伽中如來神力作亦同彼楞伽諸山及園林寶莊嚴亦爾一一山中佛皆有大慧問如來悉為說內身所證法出百千妙聲說此經法已佛及諸佛子一切隱不現羅婆那夜叉忽然見自身在己本宮殿更不見餘物而作是思惟向見者誰作說法者為誰是誰而聽聞我所見何法而有此等事彼諸佛國土及諸如來身如此諸妙事今皆何處去為是夢所憶為是幻所作為是實城邑為乾闥婆城為是瞖妄見為是陽焰起為夢石女生為我見火輪為見火輪煙我所見云何復自深思惟諸法體如是唯自心境界內心能證知而諸凡夫等無明所覆障虛妄心分別而不能覺知能見及所見一切不可得說者及所說如是等亦無佛法真實體非有亦非無法相恒如是唯自心分別如見物為實彼人不見佛不住分別心亦不能見佛不見有諸行如是名為佛若能如是見彼人見如來智者如是觀一切諸境界轉身得妙身即是佛菩薩虛空孕菩薩經偈云一切諸法相真實無知者若人住諸陰六根皆蔽塞釋曰故知諸法皆真無知無見纔有知見即落識陰則一心不通六根闇塞終不能見無見之見知無知之知若有見之見則不見一切若無知之知則無所不知所以賢護經云若菩薩觀四念處時無法可見無聲可聞無聞見故則無有法可得分別亦無有法可得思惟而亦非瞽盲聾故但是諸法無可見故以唯一真心見外無法寶星經云爾時世尊告妙音梵王汝今何故目不暫捨乃至無相觀於我耶善男子頗有一法名為佛耶頗有一物可名為名耶釋曰故知名體俱空妙旨斯在是以絕觀方見如來有無之觀皆是虛妄不入宗鏡豈辯真佛乎十住斷結經云一切諸法常自存在眾生不達為興莊嚴法法自生法法自滅法法不生法法不滅法生法滅性不移轉斯是菩薩大士之道非諸凡俗之所及也釋曰一切諸法常自存在者真心不易性相恒如眾生不達為興莊嚴者以外道執斷見小乘證無常菩薩為對治凡小故不盡有為常修福業不住無為深入智淵廣大莊嚴雲興萬行念念圓滿十波羅蜜拔斷常外道之曲木出邪見之稠林拯偏真小果之矬身昇解脫之坑底所以華嚴經云第七遠行地當修十種方便慧殊勝道所謂雖善修空無相無願三昧而慈悲不捨眾生雖得諸佛平等法而樂常供養佛雖入觀空智門而勤修習福德雖遠離三界而莊嚴三界雖畢竟寂滅諸煩惱焰而能為一切眾生起滅貪瞋癡煩惱焰雖知諸法如幻如夢如影如響如焰如化如水中月如鏡中像自性無二而隨心作業無量差別雖知一切國土猶如虛空而能以清淨妙行莊嚴佛土雖知諸佛法身本性無身而以相好莊嚴其身雖知諸佛音聲性空寂滅不可言說而能隨一切眾生出種種差別清淨音聲雖隨諸佛了知三世唯是一念而隨眾生意解分別以種種相種種時種種劫數而修行釋曰經云雖善修空無相無願三昧者是對治凡夫著有徇樂之見而慈悲不捨眾生者是對治二乘沈空畏苦之見下諸句義皆同此釋故云聲聞畏苦緣覺無悲俱失菩薩二利之行須真天子經云須真天子問文殊師利菩薩不從三脫門而求道耶文殊答言天子不可從空而成道亦不可於無相而成道亦不可於無願而成道也所以者何於是中無心意識念亦無動故有心意識念念動者乃成其道也釋曰若取三解脫門作證者即是溺實際之海背靈覺之原遺性徇空何成大道若直了神解心性念念菩提果圓不墮斷見之邪無豈涉常見之實有介爾起意大用現前無得無依非取非捨從真起行體用相收以行契真卷舒一際可謂心心合道念念冥真矣故還原觀云用則波騰海沸全真體以運行體則鏡淨水澄舉隨緣而會寂斯則不離體之用用乃波騰不離用之體體常湛寂體雖湛寂常在萬緣用雖波騰恒冥一際大方廣師子吼經云佛告電鬘菩薩善男子法唯一字所謂無字本無言說何所言說善男子當知無說是為真說爾時淨身菩薩承佛威神白佛言世尊若無所說是為真說者啞默不言皆應說法佛言如是善男子如汝所說非唯啞默者說法不啞默者亦皆說法而不知法世尊云何一切眾生說法而不知法善男子如生盲人處日光中而不見日傍人為說以他聲故乃知有日如是諸法悉入法界法界無字離諸字性非諸眾生而能宣辯釋曰審知未達宗人依通見解隨他語轉妄有所說如彼盲者不見日光聽傍人聲豈窮日體若眼開親見即知本無名字言說故知有言傷旨不達法界是以經云如是諸法悉入法界法界無字離諸字性若能深達一字唯心法界自然言語道斷法爾知解情亡豈是無辯智不能窮也如肇論云釋迦掩室於摩竭淨名杜口於毘耶須菩提唱無說以顯道釋梵絕聽而雨華斯則理為神御口以之默豈曰無辯辯所不能言也普超三昧經決狐疑品云於是阿闍世王曰唯願濡首解我狐疑濡首答言大王所疑恒河沙等諸佛世尊所不能決時王自省無救護從榻而墮如斷大樹摧折躄地大迦葉曰大王自安莫懷恐懅勿以為懼所以者何濡首童真被大智鎧善權方便而設此言可徐而問時王即起問濡首曰向者所說恒河沙諸佛不能為我而決狐疑濡首報曰王意云何假若有人而自說言我以塵暝灰烟雲霧污染虛空寧堪任乎答不能污濡首又問設令大王取此空洗之使淨寧堪任乎答曰不能淨濡首報曰吾以是向者說言恒河沙等諸佛世尊所不能決也釋曰一切眾生不了自性清淨心故妄生垢淨迷悟自沒遂於無疑中起疑於無決中求決若能諦了豁爾意消即見一切染淨諸法皆同虛空性既達虛空性不可染淨方悟本心未曾迷悟設有說無生無得之理皆是一期隨宜方便若入宗鏡妙旨了然尚無疑與無疑何懷決不決耶月燈三昧經頌云譬如有童女夜臥夢產子生欣死憂慼諸法亦復然如人飲酒醉見地悉迴轉其實未曾動諸法亦復然如淨虛空月影現於清池非月形入水諸法亦復然如人自好喜執鏡而照面鏡像不可得諸法亦復然如人在山谷歌哭言笑響聞聲不可得諸法亦復然釋曰狂醉見聞事何真實昏夢境界憂喜皆虛鏡裏之形因誰所起谷中之響起自何來所以入楞伽經云佛告楞伽王譬如有人於水鏡中自見其像於燈月中自見其影於山谷中自聞其響便生分別而起取著此亦如是法與非法唯是分別由分別故不能捨離但更增長一切虛妄不得寂滅寂滅者所謂一心一心者是最勝三昧從此能生自證聖智以如來藏而為境界法王經云於諸法中若說高下即名邪說其口當破其舌當裂何以故一切眾生心垢同一垢心淨同一淨眾生若病同一病眾生須藥應須一藥若說多法即名顛倒何以故為妄分別析善惡法破一切法故隨機說法斷佛道故釋曰同一病須一藥者以一心為病還以一心為藥以心生則法生心滅則法滅故若說多法即名顛倒者若諦自心尚不得一何況說多以心外見法即成顛倒如狂心見鬼病眼生華無中執有豈成真正隨機說法斷佛道故者執有前機早違大旨更說多法實壞正宗如法華經云若有深愛法者亦不為多說以心法甚深非多非少既不可多說亦不可少說以非多故不增以非少故不減以不增故不生以不減故不滅故華嚴經頌云一切法不生一切法不滅若能如是解諸佛常現前又藥王菩薩云我捨兩臂必當得佛金色之身兩臂即是斷常二法若捨生滅斷常之見則心佛現前頓成佛體故云必當得佛金色之身無涯際總持經云一念之頃能知三世一切諸法悉皆平等無不通達其人終無異行亦無異念釋曰無涯際總持經者以名標宗謂真心無際總持萬法攝歸一體故云平等如是通達之人終無異行者以知心外無法可作差別故亦無異念者以心內無法可起思惟故所以華嚴經十迴向品云菩薩摩訶薩如是迴向時眼終不見有不淨佛剎亦不見有異相眾生以心境一如故不退轉法輪經云善知一切眾生無相悉同法界非見非不見何以故法界即是一切眾生心界是名信行持世經云三界唯皆是識是心意識亦無形無方不在法內不在法外凡夫為虛妄相應所縛於識陰中貪著於我若我所瓔珞經云佛言吾今有十四億大眾以金剛口說決定義佛子我昔法會有一億八千無垢大士即於法會達一性原頓覺無二一切諸法皆一合相從法會出各於十方說此瓔珞又云行從心得心淨道成思益經云聖人無所斷凡夫無所生是二不出法性平等之相釋曰以凡夫迷執心外有法妄見法生若聖人明見心外無法無法可生了凡無生即聖無斷則是入一心不二法門故云不出法性平等之相以無有一法出法性外故如華嚴經頌云法性遍在一切處一切眾生及國土三世悉在無有餘亦無形相而可得勝跡菩薩所解諸法經云法唯一字所謂無字本無言說當知無說是為真說釋曰心為一字中王攝盡無邊之教海心為諸佛智母演出無盡之真詮若能發明決定信入則如來常不說法是名具足多聞亦是唯願少聞多解義趣即斯旨矣故涅槃疏云涅槃之義浩然無盡欲舉一蔽諸指鹹談海者即一心也法句經偈云森羅及萬像一法之所印云何一法中而見有種種又云雖誦千章句義不正不如一要聞可滅意釋曰雖誦千章者但徇音聲不知正義不如一要者若了一心為萬法之要達宗則息意意息則境空以萬法常虛隨意生形故不思議光菩薩經偈云一切非如法等住於如中覺了知是已無過無功德釋曰一切非如法者即是心外遍計妄執無體之法若了妄無實則一切諸法等住於一如心中如是覺知則覺外無法可為對待染淨俱空故如思益經云菩薩所化眾生無有功德以無對處故因有過患方顯功德以真心遍一切處故更無一法可為過患既無所治過患亦無能治功德二俱不立故云無過無功德諸法無行經云善住天子問文殊言若有人來求出家者當云何答文殊言若不發出家心者當教汝真出家法何者若求出家是求三界及以五欲未來報等彼不見心故不證法心無為故故不發心釋曰若證自心即入無為之理若是無為之理則無心可發斯則是真發心是真出家矣法華三昧觀經云所謂十方三世眾生若大若小乃至一稱南無佛者皆當作佛唯一大乘無二無三一切諸法一相一門所謂無生滅畢竟空相唯有此大乘無有二也習如是觀者五欲自斷五蓋自除五根增長即得禪定釋曰一稱南無佛皆當作佛者若法界含生三乘五性能歸命一心無不成佛以離自心一相一門外更無有法可作歸依無二無三畢竟空寂如是觀者五欲自斷以六塵境隨妄念故有無念則無境何用更斷故能不斷五欲而淨諸根諸根既淨五蓋自除五根五力自然增長不唯即得禪定乃至六度萬行悉皆成就如金剛三昧經云空心不動具六波羅蜜心空則一切皆空故云唯有此大乘無有二也雜藏經云為善福隨履惡禍追響之應聲善惡如音非天龍鬼神所授非先禰所為造之者心成者身口矣佛說偈曰心為法本心尊心使中心念惡即言即行罪苦自追車轢于轍心為法本心尊心使中心念善即言即行福樂自追如影隨形戊申歲分司大藏都監開板
